name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build server
        run: npm run build --workspace=packages/server

      - name: Install Playwright browsers
        run: npx --workspace=packages/web playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx --workspace=packages/web playwright test
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/web/test-results/
          retention-days: 7
