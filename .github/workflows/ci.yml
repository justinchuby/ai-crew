name: CI

on:
  push:
    branches: [main, 'team-work-*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck server
        run: npx --workspace=packages/server tsc --noEmit

      - name: Typecheck web
        run: npx --workspace=packages/web tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage --workspace=packages/server

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/server/coverage/lcov.info
          flags: server
          fail_ci_if_error: false
