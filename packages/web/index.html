<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Flightdeck</title>
    <script>
      // Apply theme before paint to prevent flash of wrong theme.
      // Matches localStorage key and logic in stores/settingsStore.ts
      (function() {
        var theme = 'dark';
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'light') theme = 'light';
          else if (saved === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        } catch(e) {}
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body class="bg-surface text-gray-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
